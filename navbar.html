<!DOCTYPE html>
<html>
    <head>
        <title> NAV BAR</title>
        <style>
            body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            }
            .topnav {
                overflow: hidden;
                background-color: #333;
            }
            .topnav a {
                float: left;
                color: green;
                text-align: center;
                padding: 14px 16px;
                text-decoration:none;
                font-size: 17px;
            }
            .topnav a:hover {
                background-color: #ddd;
                color: black;
            }
            .topnav a.active {
                background-color: #ffe066;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="topnav">
            <a class="active" href="#home"> HOME</a>
            <a href="#"> ABOUT_US</a>
            <a href="#"> GALLERY</a>
            <a href="#"> CONTACT_US</a>
        </div>
    </body>
</html>
