<!DOCTYPE html>
<html>
<center>
<head>
    <meta charset="UTF-8">
    <title>Random Number Toggle</title>
    <style>
       
        #number {
            font-size: 3rem;
            cursor: pointer;
            padding: 20px;
            border: 2px solid #333;
            display: inline-block;
            margin-top: 10px;
            user-select: none;
        }
    </style>
</head>

<body>

    <div>CLICK TO START / STOP</div>
    <div id="number" onclick="handleClick()">0</div>

    <script>
        var numberDiv;
        var t;
        var clickCount = 0;

        function change() {
            var random = Math.floor(Math.random() * 100); // 0-99
            numberDiv.innerHTML = random;
        }

        function handleClick() {
            clickCount++;

            // Logic: Odd clicks (1, 3, 5) START; Even clicks (2, 4, 6) STOP
            if (clickCount % 2 !== 0) {
                // START
                t = setInterval(change, 100);
            } else {
                // STOP
                clearInterval(t);
            }
        }
        window.onload = function () {
            numberDiv = document.getElementById("number");
        };
    </script>
</center>
</body>
</html>
